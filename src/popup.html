<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    .toggle {
      width: 50px;
      height: 26px;
      background: #ddd;
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on {
      background: #4CAF50;
    }
    .toggle::after {
      content: '';
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on::after {
      left: 26px;
    }
    .section {
      margin: 16px 0;
    }
    .label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #333;
    }
    .blur-type {
      display: flex;
      gap: 8px;
    }
    .blur-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
    }
    .blur-btn.active {
      border-color: #4CAF50;
      background: #f1f8f4;
      font-weight: 600;
    }
    .slider {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #ddd;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
    .status {
      font-size: 12px;
      color: #666;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">🛡 itblurs</span>
    <div class="toggle on" id="toggle"></div>
  </div>
  
  <div class="section">
    <div class="label">Blur type:</div>
    <div class="blur-type">
      <div class="blur-btn active" id="regionBtn">Region Only</div>
      <div class="blur-btn" id="fullscreenBtn">Full Screen</div>
    </div>
  </div>
  
  <div class="section">
    <div class="label">Sensitivity: <span id="sensitivityValue">70%</span></div>
    <input type="range" class="slider" id="sensitivity" min="0" max="100" value="70">
  </div>
  
  <div class="status">
    <span class="status-dot"></span>
    <span>Active · Local only</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
